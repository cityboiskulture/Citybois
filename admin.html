const fmt = n => '₦' + Number(n||0).toLocaleString('en-NG');
function esc(s){
  if(s===null||s===undefined) return '';
  return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
let toastTimer;
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=> t.classList.remove('show'), 2800);
}

/* ---------- AUTH ---------- */
/* ---------- AUTH (real Firebase Auth, scoped to one admin account) ---------- */
function showShell(){
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('shell').classList.add('active');
  initData();
}
function showLogin(){
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('shell').classList.remove('active');
}

document.getElementById('loginBtn').addEventListener('click', async ()=>{
  const email = document.getElementById('loginEmail').value.trim();
  const pw = document.getElementById('loginPassword').value;
  const errEl = document.getElementById('loginError');
  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.textContent = 'Signing in…';
  try{
    await window.cbAdminAuth.signIn(email, pw);
    errEl.classList.remove('show');
  }catch(e){
    errEl.textContent = 'Sign-in failed — check the email and password.';
    errEl.classList.add('show');
  }finally{
    btn.disabled = false; btn.textContent = 'Sign In';
  }
});
document.getElementById('loginPassword').addEventListener('keydown', e=>{
  if(e.key === 'Enter') document.getElementById('loginBtn').click();
});
document.getElementById('logoutBtn').addEventListener('click', ()=> window.cbAdminAuth.signOut());
document.getElementById('logoutBtnMobile').addEventListener('click', ()=>{
  closeMobileMenu();
  window.cbAdminAuth.signOut();
});

function bootAdminAuth(){
  window.cbAdminAuth.onChange(user=>{
    if(user) showShell(); else showLogin();
  });
}
if(window.cbFirebaseReady) bootAdminAuth();
else window.addEventListener('cb-ready', bootAdminAuth);

document.querySelectorAll('.side nav button, .side-menu-panel nav button').forEach(btn=>{

/* ---------- DATA INIT ---------- */
let dataInitialized = false;
function initData(){
  if(dataInitialized) return;
  dataInitialized = true;
  document.getElementById('productTableBody').innerHTML = `<tr><td colspan="8"><div class="empty-note">Loading products…</div></td></tr>`;
  document.getElementById('ordersTableBody').innerHTML = `<tr><td colspan="6"><div class="empty-note">Loading orders…</div></td></tr>`;

  const loadTimeout = setTimeout(()=>{
    document.getElementById('productTableBody').innerHTML = `<tr><td colspan="8"><div class="empty-note">This is taking a while — double check Firestore is enabled and the rules are published (see SETUP-FIREBASE.md), then refresh this page.</div></td></tr>`;
  }, 10000);

  window.cbListenProductsAdmin((items, err)=>{
    clearTimeout(loadTimeout);
    if(err){
      document.getElementById('productTableBody').innerHTML = `<tr><td colspan="8"><div class="empty-note">Couldn't load products — check that Firestore is enabled and the rules from SETUP-FIREBASE.md are published, then refresh.<br><span class="mono" style="font-size:10px;">${err.message||''}</span></div></td></tr>`;
      return;
    }
    PRODUCTS = items || [];
    renderProductTable();
    renderDashboard();
  });
  window.cbListenOrders((items, err)=>{
    if(err){
      document.getElementById('ordersTableBody').innerHTML = `<tr><td colspan="6"><div class="empty-note">Couldn't load orders — check your Firestore setup, then refresh.<br><span class="mono" style="font-size:10px;">${err.message||''}</span></div></td></tr>`;
      return;
    }
    ORDERS = items || [];
    renderOrdersTable();
    renderDashboard();
  });
}

/* ---------- DASHBOARD ---------- */
function renderDashboard(){

  const aov = paidOrders.length ? revenue / paidOrders.length : 0;
  document.getElementById('statRevenue').textContent = fmt(revenue);
  document.getElementById('statOrders').textContent = ORDERS.length;
  document.getElementById('statOrdersSub').textContent = ORDERS.filter(o=>o.status==='awaiting_verification').length + ' awaiting verification';
  document.getElementById('statAOV').textContent = fmt(Math.round(aov));
  document.getElementById('statProducts').textContent = PRODUCTS.length;

  const unitsByProduct = {};
  ORDERS.forEach(o=>{
    (o.items||[]).forEach(it=>{
      const key = it.name + ' — ' + it.edition;
      unitsByProduct[key] = (unitsByProduct[key]||0) + (it.qty||1);
    });
  });
  const top = Object.entries(unitsByProduct).sort((a,b)=>b[1]-a[1]).slice(0,5);
  document.getElementById('topProductsList').innerHTML = top.length ? top.map(([name,units])=>
    `<div class="top-product-row"><span class="tp-name">${name}</span><span class="tp-units">${units} sold</span></div>`
  ).join('') : '<div class="empty-note">No sales yet.</div>';

  const recent = ORDERS.slice(0,5);
  document.getElementById('recentOrdersList').innerHTML = recent.length ? recent.map(o=>
    `<div class="top-product-row"><span class="tp-name">${o.customer?.name||'—'} · ${(o.items||[]).length} item(s)</span><span class="tp-units">${fmt(o.total)}</span></div>`
  ).join('') : '<div class="empty-note">No orders yet.</div>';
}

  const found = PRODUCTS.find(p=>p.cat===c && p.catLabel);
  if(found) return found.catLabel;
  return c==='set'?'Casual Set':c==='scarf'?'Fringe Scarf':c==='bundle'?'Look Bundle':(c.charAt(0).toUpperCase()+c.slice(1));
}

const COLOR_PRESETS = [
  {name:'Black', hex:'#141310'}, {name:'Cream', hex:'#ece4d0'}, {name:'Green', hex:'#4a4b36'},
  {name:'White', hex:'#f5f5f0'}, {name:'Navy', hex:'#1c2438'}, {name:'Brown', hex:'#5c4430'},
  {name:'Grey', hex:'#8a8a82'}, {name:'Red', hex:'#8a2a22'}, {name:'Blue', hex:'#2c4a6e'},
  {name:'Pink', hex:'#c98a92'}, {name:'Beige', hex:'#c9b896'}, {name:'Gold', hex:'#a8763c'},

function renderColorPresets(selectedHex){
  const wrap = document.getElementById('colorPresets');
  wrap.innerHTML = COLOR_PRESETS.map(c=>
    `<span class="color-preset ${c.hex.toLowerCase()===selectedHex?.toLowerCase() ? 'active':''}" style="background:${c.hex};" data-hex="${c.hex}" title="${c.name}"></span>`
  ).join('');

}
function setSwatch(hex){
  document.getElementById('pfSwatch').value = hex;
  document.getElementById('pfSwatchPicker').value = hex;
  document.getElementById('customSwatchPreview').style.background = hex;
  document.querySelectorAll('.color-preset').forEach(el=>{
    el.classList.toggle('active', el.dataset.hex.toLowerCase()===hex.toLowerCase());

window.editProduct = function(id){
  const p = PRODUCTS.find(x=>x.id===id);
  if(!p) return;
  editingId = id;
  document.getElementById('productModalTitle').textContent = 'Edit Product';
  document.getElementById('pfId').value = p.id;
  document.getElementById('pfName').value = p.name || '';
  document.getElementById('pfEdition').value = p.edition || '';
  document.getElementById('pfCat').value = p.catLabel || p.cat || '';
  setSwatch(p.swatch || '#141310');
  document.getElementById('pfPrice').value = p.price || '';
  document.getElementById('pfCompareAt').value = p.compareAt || '';
  document.getElementById('pfTag').value = p.tag || '';
  document.getElementById('pfInStock').checked = p.inStock !== false;
  document.getElementById('pfDescription').value = p.description || '';
  document.getElementById('pfFabric').value = p.fabric || '';
  document.getElementById('pfFit').value = p.fit || '';
  document.querySelectorAll('.size-check input').forEach(c=> c.checked = (p.sizes||[]).includes(c.value));
  imageList = (p.images || []).map(url => ({type:'existing', url}));
  renderImagePreviews();
  renderColorPresets(p.swatch || '#141310');
  openProductModal();
};

document.getElementById('pfImgFile').addEventListener('change', e=>{
  const files = Array.from(e.target.files || []);
  files.forEach(file=>{
    const reader = new FileReader();
    reader.onload = ev=>{
      imageList.push({type:'new', file, previewUrl: ev.target.result});
      renderImagePreviews();
    };
    reader.readAsDataURL(file);
  });
  e.target.value = ''; // allow re-selecting the same file(s) later
});

document.getElementById('saveProductBtn').addEventListener('click', async ()=>{
  const name = document.getElementById('pfName').value.trim();
  const edition = document.getElementById('pfEdition').value.trim();
  const price = parseFloat(document.getElementById('pfPrice').value);
  const catLabelInput = document.getElementById('pfCat').value.trim();
  if(!name || !edition || !price || !catLabelInput){ showToast('Name, edition, category, and price are required.'); return; }
  if(imageList.length === 0){ showToast('Add at least one image.'); return; }

  const catSlug = catLabelInput.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'');
  const id = editingId || (name.toLowerCase().replace(/[^a-z0-9]+/g,'-') + '-' + edition.toLowerCase().replace(/[^a-z0-9]+/g,'-'));
  const sizes = [...document.querySelectorAll('.size-check input:checked')].map(c=>c.value);
  const compareAtVal = document.getElementById('pfCompareAt').value;

  const saveBtn = document.getElementById('saveProductBtn');
  saveBtn.disabled = true;

  try{
    const finalImages = [];
    const newCount = imageList.filter(it=>it.type==='new').length;
    let uploadedSoFar = 0;
    for(const item of imageList){
      if(item.type === 'existing'){
        finalImages.push(item.url);
      } else {
        uploadedSoFar++;
        saveBtn.textContent = `Uploading image ${uploadedSoFar} of ${newCount}…`;
        const url = await window.cbUploadImage(item.file, (pct)=>{
          saveBtn.textContent = `Uploading image ${uploadedSoFar} of ${newCount}… ${pct}%`;
        });
        finalImages.push(url);
      }
    }
    saveBtn.textContent = 'Saving…';
    const data = {
      family: id.split('-')[0],
      name, edition,
      swatch: document.getElementById('pfSwatch').value.trim() || '#141310',
      cat: catSlug,
      catLabel: catLabelInput,
      price,
      compareAt: compareAtVal ? parseFloat(compareAtVal) : null,
      tag: document.getElementById('pfTag').value.trim() || null,
      inStock: document.getElementById('pfInStock').checked,
      sizes: sizes.length ? sizes : ['One Size'],
      description: document.getElementById('pfDescription').value.trim(),
      fabric: document.getElementById('pfFabric').value.trim(),
      fit: document.getElementById('pfFit').value.trim(),
      images: finalImages
    };
    if(!editingId){
      data.createdAt = window.cbServerTimestamp ? window.cbServerTimestamp() : null;
    }
    await window.cbSaveProduct(id, data);
    showToast('Product saved.');
    closeProductModal();
  }catch(e){
    showToast('Save failed: ' + e.message);
  }finally{
    saveBtn.disabled = false; saveBtn.textContent = 'Save Product';
  }
});

  }catch(e){ showToast('Delete failed: ' + e.message); }
};
